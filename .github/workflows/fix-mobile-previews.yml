name: Fix real mobile previews

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-mobile-previews.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace remote mockups with real responsive screenshots
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          replacements = {
              'https://image.thum.io/get/width/430/crop/900/noanimate/https://oknazamosc.com.pl/hetman/': 'assets/realizacje/hetman-mobile.png',
              'https://image.thum.io/get/width/430/crop/900/noanimate/https://oknazamosc.com.pl/': 'assets/realizacje/mako-mobile.png',
              'https://s.wordpress.com/mshots/v1/https%3A%2F%2Foknazamosc.com.pl%2Fhetman%2F?w=1600': 'assets/realizacje/hetman-desktop.png',
              'https://s.wordpress.com/mshots/v1/https%3A%2F%2Foknazamosc.com.pl%2F?w=1600': 'assets/realizacje/mako-desktop.png',
          }

          changed = False
          for old, new in replacements.items():
              if old in html:
                  html = html.replace(old, new)
                  changed = True

          if not changed:
              print('No matching remote preview URLs found.')
          else:
              path.write_text(html, encoding='utf-8')
              print('Replaced preview URLs with local desktop/mobile screenshots.')
          PY

      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Pokaż prawdziwe wersje mobilne realizacji'
            git push
          fi
