name: Capture realization screenshots

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/capture-realizations.yml'
  workflow_dispatch:
  schedule:
    - cron: '15 4 1 * *'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Capture clean screenshots
        run: |
          mkdir -p assets/realizacje
          cat > capture.mjs <<'EOF'
          import { chromium } from 'playwright';

          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            viewport: { width: 1800, height: 1200 },
            deviceScaleFactor: 1,
            colorScheme: 'dark'
          });

          await context.addCookies([
            { name: 'cookie_notice_accepted', value: 'true', domain: '.oknazamosc.com.pl', path: '/' },
            { name: 'viewed_cookie_policy', value: 'yes', domain: '.oknazamosc.com.pl', path: '/' },
            { name: 'cookielawinfo-checkbox-necessary', value: 'yes', domain: '.oknazamosc.com.pl', path: '/' },
            { name: 'cookielawinfo-checkbox-functional', value: 'yes', domain: '.oknazamosc.com.pl', path: '/' },
            { name: 'cookielawinfo-checkbox-analytics', value: 'yes', domain: '.oknazamosc.com.pl', path: '/' },
            { name: 'cookielawinfo-checkbox-advertisement', value: 'yes', domain: '.oknazamosc.com.pl', path: '/' }
          ]);

          const jobs = [
            ['https://oknazamosc.com.pl/', 'assets/realizacje/mako.png'],
            ['https://oknazamosc.com.pl/hetman/', 'assets/realizacje/hetman.png']
          ];

          const acceptSelectors = [
            '#wt-cli-accept-all-btn',
            '#cookie_action_close_header',
            '.cky-btn-accept',
            '[data-cky-tag="accept-button"]',
            'button:has-text("Akceptuj wszystkie")',
            'button:has-text("Akceptuję")',
            'button:has-text("Zgadzam się")',
            'button:has-text("Accept all")'
          ];

          for (const [url, output] of jobs) {
            const page = await context.newPage();
            await page.goto(url, { waitUntil: 'networkidle', timeout: 120000 });
            await page.waitForTimeout(3500);

            for (const selector of acceptSelectors) {
              const button = page.locator(selector).first();
              if (await button.count()) {
                try {
                  if (await button.isVisible()) {
                    await button.click({ timeout: 2500 });
                    await page.waitForTimeout(1000);
                  }
                } catch {}
              }
            }

            await page.evaluate(() => {
              const selectors = [
                '#cookie-law-info-bar',
                '#cookie-law-info-again',
                '.cky-consent-container',
                '.cky-modal',
                '.cookie-notice-container',
                '#cookie-notice',
                '.cli-modal',
                '.cli-modal-backdrop',
                '.cmplz-cookiebanner',
                '.moove-gdpr-info-bar-container',
                '.moove-gdpr-modal-wrapper',
                '[class*="cookie-banner"]',
                '[class*="cookie-consent"]'
              ];
              selectors.forEach(selector => document.querySelectorAll(selector).forEach(el => el.remove()));
              document.documentElement.style.scrollBehavior = 'auto';
              document.documentElement.style.overflow = 'auto';
              document.body.style.overflow = 'auto';
              document.querySelectorAll('*').forEach(el => {
                const style = getComputedStyle(el);
                if (style.animationName !== 'none') el.style.animation = 'none';
                if (style.transitionDuration !== '0s') el.style.transition = 'none';
              });
              window.scrollTo(0, 0);
            });

            await page.waitForTimeout(1500);
            await page.screenshot({ path: output, fullPage: false, type: 'png' });
            await page.close();
          }

          await browser.close();
          EOF
          node capture.mjs

      - name: Commit screenshots
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/realizacje/*.png
          if git diff --cached --quiet; then
            echo 'No screenshot changes.'
          else
            git commit -m 'Odśwież zrzuty realizacji bez banerów cookies'
            git push
          fi
