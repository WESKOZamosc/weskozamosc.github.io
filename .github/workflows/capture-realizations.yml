name: Capture realization screenshots

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/capture-realizations.yml'
  workflow_dispatch:
  schedule:
    - cron: '15 4 1 * *'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium
      - name: Capture clean desktop and mobile views
        run: |
          mkdir -p assets/realizacje
          cat > capture.mjs <<'EOF'
          import { chromium } from 'playwright';
          const browser = await chromium.launch({ headless: true });
          const jobs = [
            {url:'https://oknazamosc.com.pl/',name:'mako'},
            {url:'https://oknazamosc.com.pl/hetman/',name:'hetman'}
          ];
          const cookieValues = [
            ['cookie_notice_accepted','true'],['viewed_cookie_policy','yes'],
            ['cookielawinfo-checkbox-necessary','yes'],['cookielawinfo-checkbox-functional','yes'],
            ['cookielawinfo-checkbox-analytics','yes'],['cookielawinfo-checkbox-advertisement','yes']
          ];
          const acceptSelectors=['#wt-cli-accept-all-btn','#cookie_action_close_header','.cky-btn-accept','[data-cky-tag="accept-button"]','button:has-text("Akceptuj wszystkie")','button:has-text("Akceptuję")','button:has-text("Zgadzam się")','button:has-text("Accept all")'];
          const removeSelectors=['#cookie-law-info-bar','#cookie-law-info-again','.cky-consent-container','.cky-modal','.cookie-notice-container','#cookie-notice','.cli-modal','.cli-modal-backdrop','.cmplz-cookiebanner','.moove-gdpr-info-bar-container','.moove-gdpr-modal-wrapper','[class*="cookie-banner"]','[class*="cookie-consent"]'];
          async function capture(url,name,viewport,isMobile=false){
            const context=await browser.newContext({viewport,deviceScaleFactor:1,isMobile,hasTouch:isMobile,colorScheme:'dark'});
            await context.addCookies(cookieValues.map(([name,value])=>({name,value,domain:'.oknazamosc.com.pl',path:'/'})));
            const page=await context.newPage();
            await page.goto(url,{waitUntil:'networkidle',timeout:120000});
            await page.waitForTimeout(3500);
            for(const selector of acceptSelectors){const button=page.locator(selector).first();try{if(await button.count()&&await button.isVisible())await button.click({timeout:2200})}catch{}}
            await page.evaluate(selectors=>{selectors.forEach(selector=>document.querySelectorAll(selector).forEach(el=>el.remove()));document.documentElement.style.scrollBehavior='auto';document.documentElement.style.overflow='auto';document.body.style.overflow='auto';document.querySelectorAll('*').forEach(el=>{el.style.animation='none';el.style.transition='none'});window.scrollTo(0,0)},removeSelectors);
            await page.waitForTimeout(1200);
            await page.screenshot({path:`assets/realizacje/${name}-${isMobile?'mobile':'desktop'}.png`,fullPage:false,type:'png'});
            await context.close();
          }
          for(const job of jobs){await capture(job.url,job.name,{width:1800,height:1200});await capture(job.url,job.name,{width:430,height:932},true)}
          await browser.close();
          EOF
          node capture.mjs
      - name: Commit screenshots
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/realizacje/*.png
          if git diff --cached --quiet; then
            echo 'No screenshot changes.'
          else
            git commit -m 'Odśwież czyste zrzuty realizacji desktop i mobile'
            git push
          fi
