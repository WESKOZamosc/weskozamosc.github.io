name: Capture realization screenshots

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/capture-realizations.yml'
  workflow_dispatch:
  schedule:
    - cron: '15 4 1 * *'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Capture clean screenshots
        run: |
          mkdir -p assets/realizacje
          cat > capture.mjs <<'EOF'
          import { chromium } from 'playwright';

          const browser = await chromium.launch({ headless: true });
          const projects = [
            { name: 'mako', url: 'https://oknazamosc.com.pl/' },
            { name: 'hetman', url: 'https://oknazamosc.com.pl/hetman/' }
          ];

          const cookies = [
            ['cookie_notice_accepted', 'true'],
            ['viewed_cookie_policy', 'yes'],
            ['cookielawinfo-checkbox-necessary', 'yes'],
            ['cookielawinfo-checkbox-functional', 'yes'],
            ['cookielawinfo-checkbox-analytics', 'yes'],
            ['cookielawinfo-checkbox-advertisement', 'yes']
          ];

          const acceptSelectors = [
            '#wt-cli-accept-all-btn', '#cookie_action_close_header', '.cky-btn-accept',
            '[data-cky-tag="accept-button"]', 'button:has-text("Akceptuj wszystkie")',
            'button:has-text("Akceptuję")', 'button:has-text("Zgadzam się")',
            'button:has-text("Accept all")'
          ];

          const removeSelectors = [
            '#cookie-law-info-bar', '#cookie-law-info-again', '.cky-consent-container',
            '.cky-modal', '.cookie-notice-container', '#cookie-notice', '.cli-modal',
            '.cli-modal-backdrop', '.cmplz-cookiebanner', '.moove-gdpr-info-bar-container',
            '.moove-gdpr-modal-wrapper', '[class*="cookie-banner"]',
            '[class*="cookie-consent"]', '[id*="cookie-banner"]', '[id*="cookie-consent"]'
          ];

          async function capture(project, mobile) {
            const viewport = mobile ? { width: 430, height: 900 } : { width: 1600, height: 1000 };
            const context = await browser.newContext({
              viewport,
              deviceScaleFactor: 1,
              isMobile: mobile,
              hasTouch: mobile,
              colorScheme: 'dark'
            });

            await context.addCookies(cookies.map(([name, value]) => ({
              name, value, domain: '.oknazamosc.com.pl', path: '/'
            })));

            const page = await context.newPage();
            await page.goto(project.url, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForTimeout(5000);

            for (const selector of acceptSelectors) {
              try {
                const button = page.locator(selector).first();
                if (await button.count() && await button.isVisible()) {
                  await button.click({ timeout: 2000 });
                  await page.waitForTimeout(500);
                }
              } catch {}
            }

            await page.evaluate((selectors) => {
              selectors.forEach(selector => {
                document.querySelectorAll(selector).forEach(element => element.remove());
              });
              document.documentElement.style.scrollBehavior = 'auto';
              document.documentElement.style.overflow = 'auto';
              document.body.style.overflow = 'auto';
              document.querySelectorAll('*').forEach(element => {
                element.style.animation = 'none';
                element.style.transition = 'none';
              });
              window.scrollTo(0, 0);
            }, removeSelectors);

            await page.waitForTimeout(1200);
            const suffix = mobile ? 'mobile' : 'desktop';
            await page.screenshot({
              path: `assets/realizacje/${project.name}-${suffix}.png`,
              fullPage: false,
              type: 'png'
            });
            await context.close();
          }

          for (const project of projects) {
            await capture(project, false);
            await capture(project, true);
          }

          await browser.close();
          EOF
          node capture.mjs

      - name: Commit screenshots
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/realizacje/*.png
          if git diff --cached --quiet; then
            echo 'No screenshot changes.'
          else
            git commit -m 'Odśwież czyste zrzuty realizacji'
            git push
          fi
